name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Bump this (or add entries to the `test` job's matrix below) as new
  # CPython releases become available -- uv installs the interpreter itself,
  # so there's no need to wait on the GitHub-hosted runner image to catch up.
  DEFAULT_PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --all-groups --python ${{ matrix.python-version }}
      - run: uv run --python ${{ matrix.python-version }} pytest --cov=ebms_adapter_client --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          enable-cache: true
      - run: uv build
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
